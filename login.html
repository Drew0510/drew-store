<!doctype html><html lang="vi"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Đăng nhập - Drew Store</title><link rel="stylesheet" href="./css/style.css">
</head><body>
<div class="auth-wrap">
  <section class="auth-card">
    <div class="center"><span class="eyebrow">DREW STORE</span><h2>Tài khoản</h2></div>
    <p id="message" class="message"></p>

    <div id="login-panel">
      <form id="login-form">
        <label>Tài khoản<input name="username" minlength="3" maxlength="20" pattern="[A-Za-z0-9_]+" required></label>
        <label>Mật khẩu<input name="password" type="password" minlength="6" required></label>
        <button class="primary-button" type="submit">Đăng nhập</button>
      </form>
      <p class="switch">Chưa có tài khoản? <button id="show-register" class="text-button">Đăng ký</button></p>
    </div>

    <div id="register-panel" hidden>
      <form id="register-form">
        <label>Tên tài khoản<input name="username" minlength="3" maxlength="20" pattern="[A-Za-z0-9_]+" required></label>
        <label>Mật khẩu<input name="password" type="password" minlength="6" required></label>
        <label>Nhập lại mật khẩu<input name="confirmPassword" type="password" minlength="6" required></label>
        <button class="primary-button" type="submit">Tạo tài khoản</button>
      </form>
      <p class="switch">Đã có tài khoản? <button id="show-login" class="text-button">Đăng nhập</button></p>
    </div>
  </section>
</div>
<script type="module" src="./js/login.js"></script>
</body></html>
